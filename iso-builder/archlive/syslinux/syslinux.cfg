UI vesamenu.c32
MENU TITLE NebulaOS Boot Menu
TIMEOUT 50
PROMPT 0

LABEL nebulaos
 MENU LABEL NebulaOS
 LINUX /arch/boot/x86_64/vmlinuz-linux
 INITRD /arch/boot/x86_64/initramfs-linux.img
 APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% quiet systemd.sulogin_force=1

LABEL nebulaos-fallback
 MENU LABEL NebulaOS (Fallback)
 LINUX /arch/boot/x86_64/vmlinuz-linux
 INITRD /arch/boot/x86_64/initramfs-linux-fallback.img
 APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% quiet systemd.sulogin_force=1
