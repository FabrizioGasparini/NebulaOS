set default=0
set timeout=5

insmod all_video
insmod gzio

menuentry "NebulaOS" {
    set gfxpayload=keep
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisodevice=UUID=${ARCHISO_UUID} quiet systemd.sulogin_force=1
    initrd /arch/boot/x86_64/initramfs-linux.img
}

menuentry "NebulaOS (Fallback)" {
    set gfxpayload=keep
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisodevice=UUID=${ARCHISO_UUID} quiet systemd.sulogin_force=1
    initrd /arch/boot/x86_64/initramfs-linux-fallback.img
}
