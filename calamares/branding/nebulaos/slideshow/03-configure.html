<!DOCTYPE html>
<html>
<head>
<style>
body { 
    background: #0f0a1a; 
    color: #e2d9f3; 
    font-family: 'Ubuntu', sans-serif; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
    margin: 0; 
}
.container { max-width: 600px; padding: 40px; text-align: center; }
h1 { color: #a855f7; font-size: 28px; margin-bottom: 30px; }
.step { margin: 15px 0; text-align: left; padding: 15px; background: rgba(124,58,237,0.08); border-radius: 8px; border: 1px solid rgba(124,58,237,0.15); }
.step h3 { color: #7c3aed; font-size: 16px; margin-bottom: 5px; }
.step p { color: #c4b5fd; font-size: 13px; line-height: 1.4; margin: 0; }
</style>
</head>
<body>
<div class="container">
    <h1>Installation Steps</h1>
    <div class="step">
        <h3>1. Choose Language</h3>
        <p>Select your preferred language for the system.</p>
    </div>
    <div class="step">
        <h3>2. Select Location</h3>
        <p>Choose your timezone and region.</p>
    </div>
    <div class="step">
        <h3>3. Keyboard Layout</h3>
        <p>Pick your keyboard layout.</p>
    </div>
    <div class="step">
        <h3>4. Partition Disks</h3>
        <p>Choose where to install NebulaOS.</p>
    </div>
    <div class="step">
        <h3>5. Create User</h3>
        <p>Set up your username and password.</p>
    </div>
</div>
</body>
</html>
