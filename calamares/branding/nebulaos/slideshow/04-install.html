<!DOCTYPE html>
<html>
<head>
<style>
body { 
    background: #0f0a1a; 
    color: #e2d9f3; 
    font-family: 'Ubuntu', sans-serif; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
    margin: 0; 
}
.container { max-width: 600px; padding: 40px; text-align: center; }
h1 { color: #a855f7; font-size: 28px; margin-bottom: 20px; }
p { color: #c4b5fd; font-size: 16px; line-height: 1.6; }
.spinner { 
    width: 60px; height: 60px; 
    border: 4px solid rgba(124,58,237,0.2); 
    border-top: 4px solid #7c3aed; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    margin: 30px auto; 
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <h1>Installing NebulaOS</h1>
    <p>Sit back and relax while we set up your new desktop experience. This may take a few minutes.</p>
</div>
</body>
</html>
