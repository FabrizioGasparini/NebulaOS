SERIAL 0 115200
TIMEOUT 50
PROMPT 0

UI vesamenu.c32
MENU TITLE NebulaOS

LABEL nebulaos
 MENU LABEL NebulaOS
 LINUX /arch/boot/x86_64/vmlinuz-linux
 INITRD /arch/boot/x86_64/initramfs-linux.img
 APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% nomodeset quiet

LABEL nebulaos-fallback
 MENU LABEL NebulaOS (Fallback)
 LINUX /arch/boot/x86_64/vmlinuz-linux
 INITRD /arch/boot/x86_64/initramfs-linux-fallback.img
 APPEND archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% nomodeset
